policy:
  rules:
    - detector: secrets.*
      action: flag
      upstream: filesystem
      preset_source: filesystem
    - detector: pii.*
      action: redact
      upstream: filesystem
      preset_source: filesystem
    - detector: tool_poisoning.*
      action: flag
      upstream: filesystem
      preset_source: filesystem
    - detector: prompt_injection.*
      action: flag
      upstream: filesystem
      preset_source: filesystem
